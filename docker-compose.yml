services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=beam_bot_dev
    ports:
      - "5465:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6381:6379"
      - "8002:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis_data: